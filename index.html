<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2025 메이플 스타포스 프로 시뮬레이터</title>
  <meta name="description" content="2025 KMS NEXT 패치 완벽 반영. 애니메이션 효과와 정확한 비용 계산을 제공하는 메이플스토리 스타포스 시뮬레이터입니다.">
  <link href='/style.css' rel='stylesheet'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <meta name="google-adsense-account" content="ca-pub-4639776942447769">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4639776942447769"
     crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <nav class="container">
      <div class="logo"><i class="fas fa-magic"></i> MapleStarPro</div>
      <ul>
        <li><a href="#simulator">시뮬레이터</a></li>
        <li><a href="#guide">강화 가이드</a></li>
        <li><a href="/privacy.html">개인정보 처리방침</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section id="simulator" class="main-card">
      <div class="setup-panel">
        <h3><i class="fas fa-cog"></i> 장비 설정</h3>
        <div class="input-row">
          <div class="input-group">
            <label>아이템 이름</label>
            <input type="text" id="item-name-input" value="에테르넬 무기">
          </div>
          <div class="input-group">
            <label>장비 레벨 (제한)</label>
            <select id="item-level-input">
              <option value="150">150제 (루타비스)</option>
              <option value="160" selected>160제 (앱솔랩스)</option>
              <option value="200">200제 (아케인셰이드)</option>
              <option value="250">250제 (에테르넬)</option>
            </select>
          </div>
        </div>
        <div class="option-row">
          <label><input type="checkbox" id="star-catch" checked> 스타캐치 적용</label>
          <label><input type="checkbox" id="safeguard"> 파괴 방지 적용</label>
          <label><input type="checkbox" id="event-30"> 썬데이 (비용 30% 할인)</label>
        </div>
      </div>

      <div class="game-display">
        <div id="item-container" class="item-container">
          <div class="star-grid" id="star-display">
            <!-- 별들이 여기에 5개씩 배치됨 -->
          </div>
          <div class="item-frame">
            <div class="item-icon-wrapper" id="item-icon-anim">
              <i class="fas fa-shield-alt main-icon"></i>
            </div>
            <div class="status-overlay" id="status-overlay"></div>
          </div>
          <div class="item-name-tag" id="display-item-name">에테르넬 무기</div>
        </div>

        <div class="prob-display">
          <div class="prob-item"><span>성공</span><span id="success-rate">100%</span></div>
          <div class="prob-item"><span>유지</span><span id="keep-rate">0%</span></div>
          <div class="prob-item"><span>하락</span><span id="drop-rate">0%</span></div>
          <div class="prob-item"><span>파괴</span><span id="destroy-rate">0%</span></div>
        </div>
      </div>

      <div class="action-panel">
        <div class="cost-info">
          <div>강화 비용: <span id="upgrade-cost">0</span> <small>메조</small></div>
          <div>누적 비용: <span id="total-cost">0</span> <small>메조</small></div>
        </div>
        <div class="buttons">
          <button id="btn-upgrade" class="game-btn primary">강화 시작</button>
          <button id="btn-reset" class="game-btn secondary">전체 초기화</button>
        </div>
      </div>
    </section>

    <div class="stats-grid">
      <section class="card">
        <h3><i class="fas fa-chart-bar"></i> 시뮬레이션 통계</h3>
        <div class="stat-row"><span>총 강화 횟수</span><span id="stat-total-try">0회</span></div>
        <div class="stat-row"><span>파괴 횟수</span><span id="stat-total-destroy">0회</span></div>
        <div class="stat-row"><span>최대 도달 등급</span><span id="stat-max-star">0성</span></div>
      </section>
      <section class="card">
        <h3><i class="fas fa-history"></i> 최근 기록</h3>
        <div class="log-container" id="upgrade-log">
          <p class="empty-log">준비 완료...</p>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 MapleStarPro. 최신 KMS NEXT 패치 로직 적용 완료.</p>
    </div>
  </footer>

  <script src="/main.js"></script>
</body>
</html>

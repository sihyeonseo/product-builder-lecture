<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Builder Portfolio</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <div class="profile-img">🚀</div>
      <h1>Product Builder</h1>
      <p class="subtitle">아이디어를 현실로 만드는 가치를 창조합니다.</p>
      <div class="cta-buttons">
        <button id="btn-contact" class="btn primary"><i class="fas fa-envelope"></i> 제휴 문의하기</button>
        <button id="btn-comments" class="btn secondary"><i class="fas fa-comments"></i> 피드백 남기기</button>
      </div>
    </div>
  </div>

  <div id="section-contact" class="content-section hidden">
    <div class="container">
      <button class="close-btn">&times;</button>
      <h2><i class="fas fa-paper-plane"></i> 제휴 문의</h2>
      <form action="https://formspree.io/f/xbdqrjyp" method="POST">
        <div class="form-group">
          <label for="name">성함/업체명</label>
          <input type="text" id="name" name="name" required placeholder="성함 또는 업체명을 입력해주세요.">
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
        </div>
        <button type="submit" class="submit-btn">보내기</button>
      </form>
    </div>
  </div>

  <div id="section-comments" class="content-section hidden">
    <div class="container">
      <button class="close-btn">&times;</button>
      <h2><i class="fas fa-comment-dots"></i> 커뮤니티 피드백</h2>
      <div id="disqus_thread"></div>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
  </div>

  <script src="/main.js"></script>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = 'product-builder-portfolio';
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://product-builder-ugjah1jgki.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
</body>
</html>

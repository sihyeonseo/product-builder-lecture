    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, memo } = React;
        const API_KEY = "test_f822a00191128c195adc6d1d0d220e2f821288d2387e71da7c2fde6aaaf1ce53efe8d04e6d233bd35cf2fabdeb93fb0d";

        const formatKoreanCurrency = (num, showSuffix = true) => {
            const n = parseInt(num);
            if (!n || isNaN(n) || n === 0) return '0' + (showSuffix ? '메소' : '');
            const eok = Math.floor(n / 100000000);
            const man = Math.floor((n % 100000000) / 10000);
            const remain = n % 10000;
            let res = '';
            if (eok > 0) res += `${eok}억 `;
            if (man > 0) res += `${man}만 `;
            if (remain > 0) res += `${remain}`;
            return res.trim() + (showSuffix ? ' 메소' : '');
        };

        const BASE_PROB = [
            {s:99.75,k:0.25,b:0},{s:94.5,k:5.5,b:0},{s:89.25,k:10.75,b:0},{s:89.25,k:10.75,b:0},{s:84,k:16,b:0},
            {s:78.75,k:21.25,b:0},{s:73.5,k:26.5,b:0},{s:68.25,k:31.75,b:0},{s:63,k:37,b:0},{s:57.75,k:42.25,b:0},
            {s:52.5,k:47.5,b:0},{s:47.25,k:52.75,b:0},{s:42,k:58,b:0},{s:36.75,k:63.25,b:0},{s:31.5,k:68.5,b:0},
            {s:31.5,k:66.445,b:2.055},{s:31.5,k:66.445,b:2.055},{s:15.75,k:77.51,b:6.74},{s:15.75,k:77.51,b:6.74},{s:15.75,k:75.825,b:8.425},
            {s:31.5,k:58.225,b:10.275},{s:15.75,k:71.6125,b:12.6375},{s:15.75,k:67.4,b:16.85},{s:10.5,k:71.6,b:17.9},{s:10.5,k:71.6,b:17.9},
            {s:10.5,k:71.6,b:17.9},{s:7.35,k:74.12,b:18.53},{s:5.25,k:75.8,b:18.95},{s:3.15,k:77.48,b:19.37},{s:1.05,k:79.16,b:19.79}
        ];

        const REDUCED_BOOM = {
            15:{s:31.5,k:67.0615,b:1.4385},16:{s:31.5,k:67.0615,b:1.4385},17:{s:15.75,k:79.532,b:4.718},
            18:{s:15.75,k:79.532,b:4.718},19:{s:15.75,k:78.3525,b:5.8975},20:{s:31.5,k:61.3075,b:7.1925},
            21:{s:15.75,k:75.4038,b:8.8463}
        };

        const StarRow = ({ stars }) => (
            <div className="space-y-2">
                {[0, 15].map(start => (
                    <div key={start} className="flex gap-3 justify-center">
                        {[0, 1, 2].map(g => (
                            <div key={g} className="star-group">
                                {[0, 1, 2, 3, 4].map(s => {
                                    const idx = start + g * 5 + s;
                                    return <i key={idx} className={`fas fa-star star ${idx < stars ? 'active' : ''}`}></i>
                                })}
                            </div>
                        ))}
                    </div>
                ))}
            </div>
        );

        const SimulatorPanel = memo(({ 
            isModal, modalItem, itemLevel, setItemLevel, spareCost, setSpareCost, 
            currentStars, setCurrentStars, totalAttempts, preventDestruction, toggleArray,
            selectedEvent, setSelectedEvent, discounts, setDiscounts, lastResult, 
            currentProb, costData, handleEnhance, resetAll, totalCost
        }) => {
            const levels = useMemo(() => {
                const def = [100, 110, 120, 130, 135, 140, 145, 150, 160, 200, 250];
                if (!def.includes(itemLevel)) def.push(itemLevel);
                return def.sort((a, b) => a - b);
            }, [itemLevel]);

            return (
                <div className={`flex flex-col md:flex-row gap-8 w-full ${isModal ? '' : 'mt-4'}`}>
                    <div className="flex-1 bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-gray-100 flex flex-col gap-6">
                        <section className="bg-orange-50 p-6 rounded-2xl border border-orange-100">
                            <h2 className="text-lg font-black mb-4 flex items-center gap-2 text-orange-800">장비 설정</h2>
                            <div className="grid grid-cols-2 gap-x-6 gap-y-4">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-orange-600 uppercase ml-1">장비 레벨</label>
                                    <select className="w-full bg-white border border-orange-200 rounded-xl py-3 px-2 font-black text-sm outline-none shadow-sm" value={itemLevel} onChange={(e) => setItemLevel(Number(e.target.value))}>
                                        {levels.map(lv => <option key={lv} value={lv}>{lv}제</option>)}
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-orange-600 uppercase ml-1">시작 단계</label>
                                    <select className="w-full bg-white border border-orange-200 rounded-xl py-3 px-2 font-black text-sm outline-none shadow-sm" value={currentStars} onChange={(e) => setCurrentStars(Number(e.target.value))} disabled={totalAttempts > 0}>
                                        {[...Array(31).keys()].map(s => <option key={s} value={s}>{s}성</option>)}
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-orange-600 uppercase ml-1">스페어 비용</label>
                                    <input type="number" className="w-full bg-white border border-orange-200 rounded-xl py-3 px-3 text-right font-black text-sm outline-none shadow-sm" value={spareCost} onChange={(e) => setSpareCost(e.target.value)} />
                                </div>
                                <div className="space-y-2 flex flex-col justify-end">
                                    <div className="bg-white border border-orange-100 rounded-xl p-3 text-right shadow-sm h-[46px] flex items-center justify-end overflow-hidden">
                                        <span className="text-[10px] font-black text-orange-400 uppercase mr-2 tracking-widest flex-shrink-0">Spare Price</span>
                                        <span className="text-xs font-black text-orange-600 italic truncate">{formatKoreanCurrency(spareCost)}</span>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <div className="flex-1 space-y-6 overflow-y-auto pr-2 max-h-[400px]">
                            <section>
                                <h3 className="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">파괴방지 (15, 16, 17성)</h3>
                                <div className="grid grid-cols-3 gap-2">
                                    {[15, 16, 17].map(s => (
                                        <button key={s} onClick={() => toggleArray('safeguard', s)} className={`py-3 rounded-xl border-2 font-black text-xs transition-all ${preventDestruction.includes(s) ? 'border-orange-500 bg-orange-50 text-orange-500 shadow-sm' : 'border-gray-50 bg-gray-50 text-gray-400'}`}>{s}성 파방</button>
                                    ))}
                                </div>
                            </section>
                            <section>
                                <h3 className="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">스타포스 이벤트</h3>
                                <div className="space-y-2">
                                    {["없음", "10성 이하 1+1", "비용 30% 할인", "5/10/15성 100%", "21성 이하 파괴확률 30% 감소", "샤이닝 스타포스"].map((e, i) => (
                                        <label key={i} className={`flex items-center gap-4 p-3 rounded-xl border-2 cursor-pointer transition-all ${selectedEvent === e ? 'border-orange-500 bg-orange-50 shadow-sm' : 'border-gray-50 bg-gray-50 hover:border-gray-200'}`}>
                                            <input type="radio" name="event" className="w-4 h-4 accent-orange-500" checked={selectedEvent === e} onChange={() => setSelectedEvent(e)} />
                                            <span className="text-xs font-bold">{e}</span>
                                        </label>
                                    ))}
                                </div>
                            </section>
                            <section>
                                <h3 className="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">할인 혜택</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    {["silver", "gold", "diamond", "pc"].map(k => (
                                        <label key={k} className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${discounts[k] ? 'border-orange-500 bg-orange-50' : 'border-gray-50 bg-gray-50'}`}>
                                            <input type="checkbox" className="w-4 h-4 accent-orange-500" checked={discounts[k]} onChange={() => setDiscounts(prev => ({...prev, [k]: !prev[k]}))} />
                                            <span className="text-[10px] font-bold uppercase">{k === 'pc' ? 'PC방' : `MVP ${k.toUpperCase()}`}</span>
                                        </label>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                    <div className="flex-1 bg-gray-900 p-6 md:p-8 rounded-[2rem] shadow-2xl flex flex-col items-center justify-between text-white relative border-4 border-gray-800 min-h-[600px]">
                        <div className="w-full flex justify-between items-start mb-6">
                            <div><h2 className="text-2xl font-black italic text-orange-500 tracking-tighter uppercase font-serif">ENHANCE</h2><p className="text-[9px] font-bold text-gray-500 tracking-[0.3em] uppercase truncate max-w-[200px]">{(isModal && modalItem) ? modalItem.item_name : 'Manual Setup'}</p></div>
                            <div className="text-right font-black"><span className="text-3xl tabular-nums">{currentStars}</span> <span className="text-orange-500 text-sm">STARS</span></div>
                        </div>
                        <div className={`flex flex-col items-center gap-6 w-full ${lastResult.msg.includes('!!!') ? 'animate-shake' : ''}`}>
                            <StarRow stars={currentStars} />
                            <div className={`w-28 h-28 bg-white/5 border-2 border-white/10 rounded-[2.5rem] flex items-center justify-center transition-all ${lastResult.type === 'destroy' ? 'grayscale opacity-50' : ''} overflow-hidden`}>
                                {(isModal && modalItem) ? (
                                    <img src={modalItem.item_icon} alt="item" className={`w-20 h-20 object-contain ${lastResult.type === 'success' ? 'animate-success' : ''}`} />
                                ) : (
                                    <i data-lucide="sword" class={`w-14 h-14 ${lastResult.type === 'success' ? 'text-orange-500 animate-success' : 'text-gray-400'}`}></i>
                                )}
                            </div>
                            <div className="text-center space-y-4 w-full">
                                <p className={`text-xl font-black px-10 py-3 rounded-full border-2 ${lastResult.type === 'success' ? 'border-green-500 text-green-500 bg-green-500/10 shadow-[0_0_20px_rgba(34,197,94,0.3)]' : lastResult.type === 'destroy' ? 'border-red-600 text-red-600 bg-red-600/10' : 'border-gray-500 text-gray-400 bg-gray-500/10'}`}>{lastResult.msg}</p>
                                <div className="bg-white/5 border border-white/10 rounded-2xl py-3 px-6 flex gap-6 text-[10px] font-black uppercase shadow-inner justify-center">
                                    <div className="flex flex-col"><span className="text-gray-500 text-[8px]">Success</span><span className="text-green-500 text-sm">{currentProb.success.toFixed(2)}%</span></div>
                                    <div className="w-[1px] bg-white/10"></div>
                                    <div className="flex flex-col"><span className="text-gray-500 text-[8px]">Keep</span><span className="text-gray-300 text-sm">{currentProb.fail.toFixed(2)}%</span></div>
                                    <div className="w-[1px] bg-white/10"></div>
                                    <div className="flex flex-col"><span className="text-gray-500 text-[8px]">Boom</span><span className="text-red-500 text-sm">{currentProb.destroy.toFixed(2)}%</span></div>
                                </div>
                                <div className="flex gap-3">
                                    <button className="flex-1 bg-white/10 text-gray-400 font-black py-4 rounded-xl hover:bg-white/20 transition-all border border-white/5" onClick={resetAll}>초기화</button>
                                    <button className="flex-[3] bg-orange-500 text-white font-black py-4 rounded-xl shadow-lg shadow-orange-500/20 active:scale-95 transition-all" onClick={handleEnhance} disabled={currentStars >= 30}>강화 시도</button>
                                </div>
                            </div>
                        </div>
                        <div className="w-full bg-white/5 border border-white/10 p-6 rounded-[2rem] mt-8">
                            <div className="flex justify-between items-center mb-2 px-2">
                                <p className="text-[10px] font-black text-gray-500 uppercase">Upgrade Cost</p>
                                <p className="text-sm font-black text-orange-400">{costData.total.toLocaleString()} 메소</p>
                            </div>
                            <div className="mt-4 pt-4 border-t border-white/5 text-center">
                                <p className="text-[9px] font-black text-gray-500 uppercase mb-1">Total Consumed</p>
                                <p className="text-xl font-black tracking-tight">{totalCost.toLocaleString()} 메소</p>
                                <p className="text-[10px] text-orange-500 font-bold opacity-80 mt-1 italic">{formatKoreanCurrency(totalCost)}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        });

        const StarforceSimulatorV3 = () => {
            const [activeTab, setActiveTab] = useState('simulator');
            const [itemLevel, setItemLevel] = useState(160);
            const [spareCost, setSpareCost] = useState('0');
            const spareCostRef = React.useRef('0');
            
            const handleSpareCostChange = (val) => {
                setSpareCost(val);
                spareCostRef.current = val;
            };

            const [currentStars, setCurrentStars] = useState(0);
            const [preventDestruction, setPreventDestruction] = useState([]);
            const [selectedEvent, setSelectedEvent] = useState('없음');
            const [discounts, setDiscounts] = useState({ silver: false, gold: false, diamond: false, pc: false });
            const [totalCost, setTotalCost] = useState(0);
            const [totalBooms, setTotalBooms] = useState(0);
            const [totalAttempts, setTotalAttempts] = useState(0);
            const [lastResult, setLastResult] = useState({ type: '', msg: '강화 준비 완료' });
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalItem, setModalItem] = useState(null);
            const [charNickname, setCharNickname] = useState('');
            const [searchResult, setSearchResult] = useState(null);
            const [isSearching, setIsSearching] = useState(false);

            const currentProb = useMemo(() => {
                let p = { ...(BASE_PROB[currentStars] || BASE_PROB[29]) };
                if ((selectedEvent === "5/10/15성 100%" || selectedEvent === "샤이닝 스타포스") && [5, 10, 15].includes(currentStars)) p = { s: 100, k: 0, b: 0 };
                if ((selectedEvent === "21성 이하 파괴확률 30% 감소" || selectedEvent === "샤이닝 스타포스") && currentStars >= 15 && currentStars <= 21) p = { ...REDUCED_BOOM[currentStars] };
                if (preventDestruction.includes(currentStars)) { p.k += p.b; p.b = 0; }
                return { success: p.s, destroy: p.b, fail: p.k };
            }, [currentStars, preventDestruction, selectedEvent]);

            const costData = useMemo(() => {
                const lv = parseInt(itemLevel) || 160;
                let D = 200;
                if (currentStars < 10) D = 1000; else if (currentStars < 15) D = 400; else {
                    if (currentStars === 17) D = 150; else if (currentStars === 18) D = 70; else if (currentStars === 19) D = 45; else if (currentStars === 21) D = 125;
                }
                const base = 1000 + Math.pow(lv, 3) * Math.pow(currentStars + 1, 2.7) / D;
                let rate = 0;
                if (selectedEvent === "비용 30% 할인" || selectedEvent === "샤이닝 스타포스") rate += 0.3;
                if (discounts.silver) rate += 0.03; if (discounts.gold) rate += 0.05; if (discounts.diamond) rate += 0.1; if (discounts.pc) rate += 0.05;
                const actual = base * (1 - Math.min(rate, 0.5));
                const safeguard = preventDestruction.includes(currentStars) ? actual : 0;
                return { total: Math.round((actual + safeguard) / 100) * 100, saved: Math.round((base - actual) / 100) * 100 };
            }, [currentStars, itemLevel, selectedEvent, discounts, preventDestruction]);

            const handleEnhance = useCallback(() => {
                if (currentStars >= 30) return;
                setTotalCost(prev => prev + costData.total);
                setTotalAttempts(prev => prev + 1);
                const rand = Math.random() * 100;
                if (rand < currentProb.success) {
                    if (selectedEvent === "10성 이하 1+1" && currentStars < 10) { setCurrentStars(v => Math.min(v + 2, 12)); setLastResult({ type: 'success', msg: '강화 성공! (1+1 발동)' }); }
                    else { setCurrentStars(v => v + 1); setLastResult({ type: 'success', msg: '강화 성공!' }); }
                } else if (rand < currentProb.success + currentProb.destroy) {
                    setTotalBooms(v => v + 1); setTotalCost(v => v + Number(spareCostRef.current || 0)); setCurrentStars(12); setLastResult({ type: 'destroy', msg: '장비가 파괴되었습니다!' });
                } else { setLastResult({ type: 'fail-keep', msg: '강화 실패 (단계 유지)' }); }
            }, [currentStars, costData, currentProb, selectedEvent]);

            const resetAll = useCallback(() => { setTotalCost(0); setTotalBooms(0); setTotalAttempts(0); setLastResult({ type: '', msg: '초기화되었습니다' }); }, []);
            const toggleArray = useCallback((type, val) => { if (type === 'safeguard') setPreventDestruction(prev => prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]); }, []);

            const handleCharSearch = async (e) => {
                e.preventDefault(); if (!charNickname) return; setIsSearching(true);
                try {
                    const today = new Date(); today.setDate(today.getDate() - 1);
                    const formattedDate = today.toISOString().split('T')[0];
                    const idRes = await fetch(`https://open.api.nexon.com/maplestory/v1/id?character_name=${charNickname}`, { headers: { "x-nxopen-api-key": API_KEY } });
                    const idData = await idRes.json(); if (!idData.ocid) throw new Error("캐릭터를 찾을 수 없습니다.");
                    const ocid = idData.ocid;
                    const [basic, stat, item] = await Promise.all([
                        fetch(`https://open.api.nexon.com/maplestory/v1/character/basic?ocid=${ocid}&date=${formattedDate}`, { headers: { "x-nxopen-api-key": API_KEY } }).then(r => r.json()),
                        fetch(`https://open.api.nexon.com/maplestory/v1/character/stat?ocid=${ocid}&date=${formattedDate}`, { headers: { "x-nxopen-api-key": API_KEY } }).then(r => r.json()),
                        fetch(`https://open.api.nexon.com/maplestory/v1/character/item-equipment?ocid=${ocid}&date=${formattedDate}`, { headers: { "x-nxopen-api-key": API_KEY } }).then(r => r.json())
                    ]);
                    const cp = stat.final_stat?.find(s => s.stat_name === "전투력")?.stat_value || "0";
                    setSearchResult({ basic, combatPower: formatKoreanCurrency(parseInt(cp), false), items: item.item_equipment || [], converted: (parseInt(cp)/1000000).toFixed(1), hexa: (parseInt(cp)/850000).toFixed(1) });
                } catch (err) { alert(err.message); } finally { setIsSearching(false); }
            };

            const openItemModal = (item) => {
                if (parseInt(item.starforce) === 0 && !item.item_name.includes("칠요")) { alert("강화가 불가능한 아이템입니다."); return; }
                
                let detectedLevel = 160;
                const name = item.item_name;
                if (name.includes('에테르넬')) detectedLevel = 250;
                else if (name.includes('아케인쉐이드')) detectedLevel = 200;
                else if (name.includes('앱솔랩스')) detectedLevel = 160;
                else if (name.includes('파프니르') || name.includes('루타비스')) detectedLevel = 150;
                else if (name.includes('데아 시두스') || name.includes('실버블라썸') || name.includes('고귀한 이피아') || name.includes('블랙빈')) detectedLevel = 130;
                else if (name.includes('도미네이터') || name.includes('마이스터') || name.includes('분노한 자쿰') || name.includes('트와일라이트') || name.includes('데이브레이크')) detectedLevel = 140;
                else if (name.includes('가디언 엔젤') || name.includes('에스텔라') || name.includes('마력이 깃든') || name.includes('루즈 컨트롤')) detectedLevel = 160;
                else if (name.includes('파풀라투스 마크')) detectedLevel = 145;
                else if (name.includes('지옥의 불꽃')) detectedLevel = 130;
                else if (name.includes('핑크빈 마크')) detectedLevel = 135;
                else if (name.includes('태초의 정수') || name.includes('칠옥') || name.includes('거대한 공포') || name.includes('고통의 근원') || name.includes('커맨더')) detectedLevel = 200;
                
                if (item.item_base_level && Number(item.item_base_level) > 0) detectedLevel = Number(item.item_base_level);

                setModalItem(item); setItemLevel(detectedLevel); setCurrentStars(Number(item.starforce)); 
                setSpareCost('0'); spareCostRef.current = '0';
                resetAll(); setIsModalOpen(true);
            };

            useEffect(() => { lucide.createIcons(); }, [activeTab, isModalOpen, searchResult]);

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('simulator')}><i data-lucide="zap" class="w-6 h-6 text-orange-500 fill-orange-500"></i><span className="text-xl font-black tracking-tighter text-gray-900 uppercase">Starforce Pro</span></div>
                            <nav className="hidden md:flex gap-8">
                                <button onClick={() => setActiveTab('simulator')} className={`text-sm font-bold transition-colors ${activeTab === 'simulator' ? 'text-orange-500' : 'text-gray-600 hover:text-orange-500'}`}>시뮬레이터</button>
                                <button onClick={() => setActiveTab('character')} className={`text-sm font-bold transition-colors ${activeTab === 'character' ? 'text-orange-500' : 'text-gray-600 hover:text-orange-500'}`}>캐릭터 정보</button>
                                <button onClick={() => setActiveTab('guide')} className={`text-sm font-bold transition-colors ${activeTab === 'guide' ? 'text-orange-500' : 'text-gray-600 hover:text-orange-500'}`}>강화 가이드</button>
                                <a href="https://now.nexon.com/service/maplestory?page=562d346f-f2c9-4425-bb08-12680e165251" target="_blank" className="text-sm font-bold text-gray-600 hover:text-orange-500 transition-colors flex items-center gap-1">공식 확률표 <i data-lucide="external-link" class="w-3 h-3"></i></a>
                            </nav>
                            <div className="flex items-center gap-4"><span className="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-xs font-black uppercase tracking-tight italic font-serif">KMS 2025 NEXT</span></div>
                        </div>
                    </header>
                    <div className="flex-1">
                        {activeTab === 'simulator' && <main className="max-w-7xl mx-auto p-4 md:p-8 w-full"><SimulatorPanel isModal={false} itemLevel={itemLevel} setItemLevel={setItemLevel} spareCost={spareCost} setSpareCost={handleSpareCostChange} currentStars={currentStars} setCurrentStars={setCurrentStars} totalAttempts={totalAttempts} preventDestruction={preventDestruction} toggleArray={toggleArray} selectedEvent={selectedEvent} setSelectedEvent={setSelectedEvent} discounts={discounts} setDiscounts={setDiscounts} lastResult={lastResult} currentProb={currentProb} costData={costData} handleEnhance={handleEnhance} resetAll={resetAll} totalCost={totalCost} /></main>}
                        {activeTab === 'character' && (
                            <main className="max-w-6xl mx-auto p-4 md:p-8 w-full mt-4 flex flex-col gap-8">
                                <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col items-center gap-8">
                                    <div className="text-center"><h2 className="text-3xl font-black text-gray-900 mb-2 tracking-tighter italic uppercase">Character Database</h2><p className="text-gray-400 font-bold text-xs uppercase tracking-[0.2em]">Live NEXON Open API Search</p></div>
                                    <form onSubmit={handleCharSearch} className="w-full max-w-xl flex gap-3"><div className="flex-1 relative"><input type="text" placeholder="닉네임을 입력하세요" className="w-full bg-gray-50 border-2 border-transparent rounded-2xl py-4 px-6 pl-12 outline-none focus:border-orange-500 focus:bg-white transition-all font-black text-lg shadow-inner" value={charNickname} onChange={(e) => setCharNickname(e.target.value)} /><div className="absolute left-4 top-4.5 text-gray-400"><i data-lucide="search" class="w-5 h-5"></i></div></div><button type="submit" disabled={isSearching} className="bg-orange-50 text-white px-8 rounded-2xl font-black shadow-lg shadow-orange-100 hover:bg-orange-600 disabled:opacity-50 transition-all uppercase italic">{isSearching ? '...' : 'Search'}</button></form>
                                    {searchResult && (
                                        <div className="w-full flex flex-col lg:flex-row gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500 mt-4">
                                            <div className="lg:w-1/3 flex flex-col gap-6 text-center"><div className="bg-gray-900 rounded-[2.5rem] p-8 text-white flex flex-col items-center gap-6 shadow-2xl relative overflow-hidden"><div className="absolute top-0 right-0 w-32 h-32 bg-orange-500/10 rounded-full -mr-16 -mt-16 blur-3xl"></div><img src={searchResult.basic.character_image} alt="Avatar" className="w-32 h-32 drop-shadow-[0_0_15px_rgba(255,140,0,0.3)] mx-auto" /><div><span className="text-[10px] font-black bg-orange-500 text-white px-2 py-0.5 rounded mr-2 uppercase">{searchResult.basic.world_name}</span><h3 className="text-2xl font-black mt-2">{searchResult.basic.character_name}</h3><p className="text-gray-500 text-xs font-bold mt-1 uppercase tracking-widest">Lv.{searchResult.basic.character_level} | {searchResult.basic.character_class}</p></div><div className="w-full space-y-3"><div className="bg-white/5 border border-white/10 rounded-2xl p-4"><span className="text-[10px] font-black text-gray-500 uppercase mb-1 block text-xs">전투력</span><span className="text-2xl font-black text-orange-500 tabular-nums italic tracking-tighter">{searchResult.combatPower}</span></div><div className="grid grid-cols-2 gap-3 text-center"><div className="bg-white/5 border border-white/10 rounded-2xl p-4"><p className="text-[9px] font-black text-gray-500 uppercase mb-1">환산</p><p className="font-black text-sm">{searchResult.converted}만</p></div><div className="bg-white/5 border border-white/10 rounded-2xl p-4"><p className="text-[9px] font-black text-gray-500 uppercase mb-1">헥사환산</p><p className="font-black text-sm">{searchResult.hexa}만</p></div></div></div></div></div>
                                            <div className="flex-1 flex flex-col gap-6"><div className="bg-white border border-gray-100 rounded-[2.5rem] p-8 shadow-sm"><h3 className="text-lg font-black mb-2 flex items-center gap-2 uppercase tracking-tighter italic">Equipment Grid</h3><p className="text-[10px] text-gray-400 font-bold mb-6 uppercase tracking-widest italic">Click an item to open pop-up simulator</p><div className="equipment-grid">{searchResult.items.map((item, idx) => (<div key={idx} className="group relative" onClick={() => openItemModal(item)}><div className="w-full aspect-square bg-gray-50 border border-gray-100 rounded-xl flex items-center justify-center p-2 hover:border-orange-500 hover:bg-orange-50 transition-all cursor-pointer overflow-hidden shadow-sm"><img src={item.item_icon} alt="item" className="w-full h-full object-contain group-hover:scale-110 transition-transform" /></div><div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-32 bg-gray-900 text-white text-[9px] p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none text-center shadow-xl"><p className="font-black mb-1">{item.item_name}</p><p className="text-orange-500 font-bold">★ {item.starforce}</p></div></div>))}</div></div></div>
                                        </div>
                                    )}
                                </div>
                            </main>
                        )}
                        {activeTab === 'guide' && <article className="max-w-7xl mx-auto px-4 md:px-8 py-16 w-full"><div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-gray-100 article-content"><h2 className="text-3xl font-black tracking-tight text-gray-900 mb-8 border-b-4 border-orange-500 inline-block pb-2 italic uppercase">Enhance Strategy Guide</h2><section><h3>1. 메이플스토리 스타포스란?</h3><p>스타포스는 장비의 잠재능력을 극한까지 끌어올리는 메이플스토리의 핵심 강화 시스템입니다.</p></section><section><h3>2. 2025 KMS NEXT 최신 개편 사항 (하락 삭제)</h3><p>메이플스토리의 가장 혁신적인 변화 중 하나는 15성 이상의 모든 구간에서 실패 시 등급 하락이 완전히 삭제되었다는 점입니다. 이제는 파괴되지 않는 한 별이 유지되므로 목표 등급까지의 심리적 부담이 크게 줄어들었습니다.</p></section></div></article>}
                    </div>
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay animate-in fade-in duration-300">
                            <div className="bg-gray-50 w-full max-w-6xl max-h-[90vh] overflow-y-auto rounded-[3rem] shadow-2xl relative p-4 md:p-8 flex flex-col gap-6 border-4 border-orange-500/20">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-6 right-6 w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center hover:bg-red-100 hover:text-red-500 transition-all z-10"><i data-lucide="x" class="w-6 h-6"></i></button>
                                <div className="text-center"><h2 className="text-2xl font-black text-gray-900 italic tracking-tighter uppercase">Item Simulator</h2><p className="text-orange-500 font-bold uppercase tracking-widest text-xs">Simulating: {modalItem?.item_name}</p></div>
                                <SimulatorPanel isModal={true} modalItem={modalItem} itemLevel={itemLevel} setItemLevel={setItemLevel} spareCost={spareCost} setSpareCost={handleSpareCostChange} currentStars={currentStars} setCurrentStars={setCurrentStars} totalAttempts={totalAttempts} preventDestruction={preventDestruction} toggleArray={toggleArray} selectedEvent={selectedEvent} setSelectedEvent={setSelectedEvent} discounts={discounts} setDiscounts={setDiscounts} lastResult={lastResult} currentProb={currentProb} costData={costData} handleEnhance={handleEnhance} resetAll={resetAll} totalCost={totalCost} />
                            </div>
                        </div>
                    )}
                    <footer className="bg-white border-t border-gray-200 py-12 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 md:px-8 flex flex-col md:flex-row justify-between items-center gap-8 text-center md:text-left">
                            <div><div className="flex items-center gap-2 mb-4 justify-center md:justify-start"><i data-lucide="zap" class="w-5 h-5 text-gray-400"></i><span className="font-black tracking-tighter text-gray-900 uppercase">Starforce Pro</span></div><p className="text-xs text-gray-400 font-medium">본 사이트는 메이플스토리 팬 사이트입니다. 모든 데이터는 공식 확률을 기반으로 제작되었습니다.</p></div>
                            <div className="flex flex-wrap justify-center gap-6"><button onClick={() => setActiveTab('simulator')} className="text-xs font-bold text-gray-500 hover:text-orange-500 transition-colors uppercase tracking-widest">Simulator</button><button onClick={() => setActiveTab('character')} className={`text-xs font-bold text-gray-500 hover:text-orange-500 transition-colors uppercase tracking-widest`}>Character</button><button onClick={() => setActiveTab('guide')} className="text-xs font-bold text-gray-500 hover:text-orange-500 transition-colors uppercase tracking-widest">Guide</button><a href="/privacy.html" className="text-xs font-bold text-gray-500 hover:text-orange-500 transition-colors uppercase tracking-widest underline decoration-orange-500 decoration-2 underline-offset-4">Privacy Policy</a></div>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 md:px-8 mt-12 pt-8 border-t border-gray-100 text-center"><p className="text-[10px] text-gray-300 font-black uppercase tracking-[0.2em]">&copy; 2026 Starforce Pro. All rights reserved.</p></div>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StarforceSimulatorV3 />);
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>

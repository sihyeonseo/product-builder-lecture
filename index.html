<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플 스타포스 시뮬레이터 Pro - 2025 최신 강화 가이드 & 공식 확률</title>
    <meta name="description" content="메이플스토리 스타포스 강화 비용과 확률을 실시간으로 시뮬레이션하세요. 2025 KMS NEXT 최신 패치 반영, 하락 삭제 로직 및 고득점 전략 가이드 제공.">
    <meta name="keywords" content="메이플스토리, 스타포스, 시뮬레이터, 강화확률, 샤이닝스타포스, 메이플나우, 강화비용, 2025메이플">
    
    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-4639776942447769">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4639776942447769" crossorigin="anonymous"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { orange: { 500: '#FF8C00', 600: '#E67E00', 50: '#FFF7ED' } },
                    animation: { 'shake': 'shake 0.2s ease-in-out', 'success': 'success 0.5s ease-out' },
                    keyframes: {
                        shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-5px)' }, '75%': { transform: 'translateX(5px)' } },
                        success: { '0%': { transform: 'scale(1)', filter: 'brightness(1)' }, '50%': { transform: 'scale(1.1)', filter: 'brightness(1.5)' }, '100%': { transform: 'scale(1)', filter: 'brightness(1)' } }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        body { font-family: "Pretendard", sans-serif; letter-spacing: -0.025em; }
        .star-group { display: flex; gap: 4px; }
        .star { font-size: 0.8rem; color: #374151; transition: all 0.2s; }
        .star.active { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 1); }
        .article-content h3 { font-size: 1.25rem; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; color: #111827; }
        .article-content p { font-size: 1rem; line-height: 1.75; color: #4b5563; margin-bottom: 1rem; }
        .article-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .article-content li { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const formatKoreanCurrency = (num) => {
            if (!num || num === 0) return '0메소';
            const unitEok = Math.floor(num / 100000000);
            const unitMan = Math.floor((num % 100000000) / 10000);
            let result = '';
            if (unitEok > 0) result += `${unitEok}억 `;
            if (unitMan > 0) result += `${unitMan}만`;
            return result.trim() + ' 메소';
        };

        const BASE_PROB_TABLE = [
            { s: 99.75, k: 0.25, b: 0 }, { s: 94.50, k: 5.50, b: 0 }, { s: 89.25, k: 10.75, b: 0 },
            { s: 89.25, k: 10.75, b: 0 }, { s: 84.00, k: 16.00, b: 0 }, { s: 78.75, k: 21.25, b: 0 },
            { s: 73.50, k: 26.50, b: 0 }, { s: 68.25, k: 31.75, b: 0 }, { s: 63.00, k: 37.00, b: 0 },
            { s: 57.75, k: 42.25, b: 0 }, { s: 52.50, k: 47.50, b: 0 }, { s: 47.25, k: 52.75, b: 0 },
            { s: 42.00, k: 58.00, b: 0 }, { s: 36.75, k: 63.25, b: 0 }, { s: 31.50, k: 68.50, b: 0 },
            { s: 31.50, k: 66.445, b: 2.055 }, { s: 31.50, k: 66.445, b: 2.055 }, { s: 15.75, k: 77.51, b: 6.74 },
            { s: 15.75, k: 77.51, b: 6.74 }, { s: 15.75, k: 75.825, b: 8.425 }, { s: 31.50, k: 58.225, b: 10.275 },
            { s: 15.75, k: 71.6125, b: 12.6375 }, { s: 15.75, k: 67.40, b: 16.85 }, { s: 10.50, k: 71.60, b: 17.90 },
            { s: 10.50, k: 71.60, b: 17.90 }, { s: 10.50, k: 71.60, b: 17.90 }, { s: 7.35, k: 74.12, b: 18.53 },
            { s: 5.25, k: 75.80, b: 18.95 }, { s: 3.15, k: 77.48, b: 19.37 }, { s: 1.05, k: 79.16, b: 19.79 },
        ];

        const GROUP3_REDUCED_BOOM = {
            15: { s: 31.50, k: 67.0615, b: 1.4385 }, 16: { s: 31.50, k: 67.0615, b: 1.4385 },
            17: { s: 15.75, k: 79.532, b: 4.718 }, 18: { s: 15.75, k: 79.532, b: 4.718 },
            19: { s: 15.75, k: 78.3525, b: 5.8975 }, 20: { s: 31.50, k: 61.3075, b: 7.1925 },
            21: { s: 15.75, k: 75.4038, b: 8.8463 },
        };

        const StarforceSimulatorV3 = () => {
            const [itemLevel, setItemLevel] = useState(160);
            const [currentStars, setCurrentStars] = useState(0);
            const [preventDestruction, setPreventDestruction] = useState([]);
            const [selectedEvent, setSelectedEvent] = useState('없음');
            const [discounts, setDiscounts] = useState({ silver: false, gold: false, diamond: false, pc: false });

            const [totalCost, setTotalCost] = useState(0);
            const [totalBooms, setTotalBooms] = useState(0);
            const [totalAttempts, setTotalAttempts] = useState(0);
            const [lastResult, setLastResult] = useState({ type: '', msg: '강화 준비 완료' });
            const [isAnimating, setIsAnimating] = useState(false);

            const currentProb = useMemo(() => {
                let prob = { ...BASE_PROB_TABLE[currentStars] };
                if ((selectedEvent === "5/10/15성 100%" || selectedEvent === "샤이닝 스타포스") && [5, 10, 15].includes(currentStars)) {
                    prob = { s: 100.00, k: 0.00, b: 0.00 };
                }
                if ((selectedEvent === "21성 이하 파괴확률 30% 감소" || selectedEvent === "샤이닝 스타포스") && currentStars >= 15 && currentStars <= 21) {
                    prob = { ...GROUP3_REDUCED_BOOM[currentStars] };
                }
                if (preventDestruction.includes(currentStars)) {
                    prob.k += prob.b; prob.b = 0;
                }
                return { success: prob.s, destroy: prob.b, fail: prob.k };
            }, [currentStars, preventDestruction, selectedEvent]);

            const costData = useMemo(() => {
                let D = 200;
                if (currentStars < 10) D = 1000;
                else if (currentStars < 15) D = 400;
                else {
                    if (currentStars === 17) D = 150;
                    else if (currentStars === 18) D = 70;
                    else if (currentStars === 19) D = 45;
                    else if (currentStars === 21) D = 125;
                }
                const baseCost = 1000 + Math.pow(itemLevel, 3) * Math.pow(currentStars + 1, 2.7) / D;
                let discountRate = 0;
                if (selectedEvent === "비용 30% 할인" || selectedEvent === "샤이닝 스타포스") discountRate += 0.30;
                if (discounts.silver) discountRate += 0.03;
                if (discounts.gold) discountRate += 0.05;
                if (discounts.diamond) discountRate += 0.10;
                if (discounts.pc) discountRate += 0.05;
                const actualCost = baseCost * (1 - Math.min(discountRate, 0.5));
                const safeguardCost = preventDestruction.includes(currentStars) ? actualCost : 0;
                return {
                    total: Math.round((actualCost + safeguardCost) / 100) * 100,
                    saved: Math.round((baseCost - actualCost) / 100) * 100
                };
            }, [currentStars, itemLevel, selectedEvent, discounts, preventDestruction]);

            const handleEnhance = () => {
                if (isAnimating || currentStars >= 30) return;
                setTotalCost(prev => prev + costData.total);
                setTotalAttempts(prev => prev + 1);
                setIsAnimating(true);
                setTimeout(() => {
                    const rand = Math.random() * 100;
                    if (rand < currentProb.success) {
                        if (selectedEvent === "10성 이하 1+1" && currentStars < 10) {
                            setCurrentStars(prev => Math.min(prev + 2, 12));
                            setLastResult({ type: 'success', msg: '강화 성공! (1+1 발동)' });
                        } else {
                            setCurrentStars(prev => prev + 1);
                            setLastResult({ type: 'success', msg: '강화 성공!' });
                        }
                    } else if (rand < currentProb.success + currentProb.destroy) {
                        setTotalBooms(prev => prev + 1);
                        setCurrentStars(12);
                        setLastResult({ type: 'destroy', msg: '장비가 파괴되었습니다!' });
                    } else {
                        setLastResult({ type: 'fail-keep', msg: '강화 실패 (단계 유지)' });
                    }
                    setIsAnimating(false);
                }, 400);
            };

            const resetAll = () => {
                setTotalCost(0); setTotalBooms(0); setTotalAttempts(0);
                setLastResult({ type: '', msg: '초기화되었습니다' });
            };

            const StarRow = ({ start }) => (
                <div className="flex gap-3 justify-center mb-2">
                    {[0, 1, 2].map(g => (
                        <div key={g} className="star-group">
                            {[0, 1, 2, 3, 4].map(s => {
                                const idx = start + g * 5 + s;
                                return <i key={idx} className={`fas fa-star star ${idx < currentStars ? 'active' : ''}`}></i>
                            })}
                        </div>
                    ))}
                </div>
            );

            useEffect(() => { lucide.createIcons(); }, [lastResult, currentStars, selectedEvent, discounts, preventDestruction]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header/Navigation */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <i data-lucide="zap" class="w-6 h-6 text-orange-500 fill-orange-500"></i>
                                <span className="text-xl font-black tracking-tighter text-gray-900">STARFORCE PRO</span>
                            </div>
                            <nav className="hidden md:flex gap-8">
                                <a href="#simulator" className="text-sm font-bold text-gray-600 hover:text-orange-500 transition-colors">시뮬레이터</a>
                                <a href="#guide" className="text-sm font-bold text-gray-600 hover:text-orange-500 transition-colors">강화 가이드</a>
                                <a href="#probability" className="text-sm font-bold text-gray-600 hover:text-orange-500 transition-colors">공식 확률표</a>
                            </nav>
                            <div className="flex items-center gap-4">
                                <span className="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-xs font-black uppercase">KMS NEXT v1.2</span>
                            </div>
                        </div>
                    </header>

                    {/* Main Simulator Section */}
                    <main id="simulator" className="max-w-7xl mx-auto p-4 md:p-8 flex flex-col md:flex-row gap-8 w-full mt-4">
                        {/* 좌측 패널 */}
                        <div className="flex-1 bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-gray-100 flex flex-col gap-6">
                            <section className="bg-orange-50 p-6 rounded-2xl border border-orange-100">
                                <h2 className="text-lg font-black mb-4 flex items-center gap-2 text-orange-800">장비 설정</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-orange-600 uppercase ml-1">레벨</label>
                                        <select className="w-full bg-white border border-orange-200 rounded-xl py-3 px-2 font-black text-sm outline-none shadow-sm" value={itemLevel} onChange={(e) => setItemLevel(Number(e.target.value))}>
                                            {[130, 140, 150, 160, 200, 250].map(lv => <option key={lv} value={lv}>{lv}제</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-orange-600 uppercase ml-1">시작 단계</label>
                                        <select className="w-full bg-white border border-orange-200 rounded-xl py-3 px-2 font-black text-sm outline-none shadow-sm" value={currentStars} onChange={(e) => setCurrentStars(Number(e.target.value))} disabled={totalAttempts > 0}>
                                            {[...Array(30).keys()].map(s => <option key={s} value={s}>{s}성</option>)}
                                        </select>
                                    </div>
                                </div>
                            </section>

                            <div className="flex-1 space-y-6 overflow-y-auto pr-2">
                                <section>
                                    <h3 className="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">파괴방지 (15, 16, 17성)</h3>
                                    <div className="grid grid-cols-3 gap-2">
                                        {[15, 16, 17].map(s => (
                                            <button key={s} onClick={() => setPreventDestruction(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s])} className={`py-3 rounded-xl border-2 font-black text-xs transition-all ${preventDestruction.includes(s) ? 'border-orange-500 bg-orange-50 text-orange-500 shadow-sm' : 'border-gray-50 bg-gray-50 text-gray-400'}`}>{s}성 파방</button>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">스타포스 이벤트</h3>
                                    <div className="space-y-2">
                                        {["없음", "10성 이하 1+1", "비용 30% 할인", "5/10/15성 100%", "21성 이하 파괴확률 30% 감소", "샤이닝 스타포스"].map((e, i) => (
                                            <label key={i} className={`flex items-center gap-4 p-3 rounded-xl border-2 cursor-pointer transition-all ${selectedEvent === e ? 'border-orange-500 bg-orange-50 shadow-sm' : 'border-gray-50 bg-gray-50 hover:border-gray-200'}`}>
                                                <input type="radio" name="event" className="w-4 h-4 accent-orange-500" checked={selectedEvent === e} onChange={() => setSelectedEvent(e)} />
                                                <span className="text-xs font-bold">{e}</span>
                                            </label>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">할인 혜택</h3>
                                    <div className="grid grid-cols-2 gap-2">
                                        {[["silver", "MVP 실버"], ["gold", "MVP 골드"], ["diamond", "MVP 다이아"], ["pc", "PC방"]].map(([k, l]) => (
                                            <label key={k} className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${discounts[k] ? 'border-orange-500 bg-orange-50' : 'border-gray-50 bg-gray-50'}`}>
                                                <input type="checkbox" className="w-4 h-4 accent-orange-500" checked={discounts[k]} onChange={() => setDiscounts(prev => ({...prev, [k]: !prev[k]}))} />
                                                <span className="text-[10px] font-bold">{l}</span>
                                            </label>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        </div>

                        {/* 우측 패널 (강화창) */}
                        <div className="flex-1 bg-gray-900 p-6 md:p-8 rounded-[2rem] shadow-2xl flex flex-col items-center justify-between text-white relative border-4 border-gray-800">
                            <div className="w-full flex justify-between items-start mb-6">
                                <div><h2 className="text-2xl font-black italic text-orange-500 tracking-tighter uppercase">ENHANCE</h2><p className="text-[9px] font-bold text-gray-500 tracking-[0.3em]">MAPLE NOW OFFICIAL PROB</p></div>
                                <div className="text-right font-black"><span className="text-3xl tabular-nums">{currentStars}</span> <span className="text-orange-500 text-sm">STARS</span></div>
                            </div>

                            <div className={`flex flex-col items-center gap-6 w-full ${isAnimating ? 'animate-shake' : ''}`}>
                                <div className="w-full">
                                    <StarRow start={0} />
                                    <StarRow start={15} />
                                </div>
                                <div className={`w-28 h-28 bg-white/5 border-2 border-white/10 rounded-[2.5rem] flex items-center justify-center transition-all ${lastResult.type === 'destroy' ? 'grayscale opacity-50' : ''}`}>
                                    <i data-lucide="sword" class={`w-14 h-14 ${lastResult.type === 'success' ? 'text-orange-500 animate-success' : 'text-gray-400'}`}></i>
                                </div>
                                <div className="text-center space-y-4 w-full">
                                    <p className={`text-xl font-black px-10 py-3 rounded-full border-2 ${lastResult.type === 'success' ? 'border-green-500 text-green-500 bg-green-500/10 shadow-[0_0_20px_rgba(34,197,94,0.3)]' : lastResult.type === 'destroy' ? 'border-red-600 text-red-600 bg-red-600/10' : 'border-gray-500 text-gray-400 bg-gray-500/10'}`}>{lastResult.msg}</p>
                                    <div className="bg-white/5 border border-white/10 rounded-2xl py-3 px-6 flex gap-6 text-[10px] font-black uppercase tracking-widest shadow-inner justify-center">
                                        <div className="flex flex-col"><span className="text-gray-500 mb-1 font-sans">Success</span><span className="text-green-500 text-sm">{currentProb.success.toFixed(2)}%</span></div>
                                        <div className="w-[1px] bg-white/10"></div>
                                        <div className="flex flex-col"><span className="text-gray-500 mb-1 font-sans">Keep</span><span className="text-gray-300 text-sm">{currentProb.fail.toFixed(2)}%</span></div>
                                        <div className="w-[1px] bg-white/10"></div>
                                        <div className="flex flex-col"><span className="text-gray-500 mb-1 font-sans">Boom</span><span className="text-red-500 text-sm">{currentProb.destroy.toFixed(2)}%</span></div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button className="flex-1 bg-white/10 text-gray-400 font-black py-4 rounded-xl hover:bg-white/20 transition-all border border-white/5" onClick={resetAll}>초기화</button>
                                        <button className="flex-[3] bg-orange-500 text-white font-black py-4 rounded-xl shadow-lg shadow-orange-500/20 disabled:opacity-50 active:scale-95 transition-all" onClick={handleEnhance} disabled={isAnimating || currentStars >= 30}>강화 시도</button>
                                    </div>
                                </div>
                            </div>

                            <div className="w-full bg-white/5 border border-white/10 p-6 rounded-[2rem] mt-8">
                                <div className="flex justify-between items-center mb-4 px-2 text-right">
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Upgrade Cost</p>
                                    <div>
                                        <p className="text-sm font-black text-orange-400 tabular-nums">{costData.total.toLocaleString()} 메소</p>
                                        {costData.saved > 0 && <p className="text-[9px] text-green-500 font-bold tracking-tight">(-{costData.saved.toLocaleString()} 메소 할인적용)</p>}
                                    </div>
                                </div>
                                <div className="mt-4 pt-4 border-t border-white/5 text-center">
                                    <p className="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1">Total Consumed</p>
                                    <p className="text-xl font-black tabular-nums tracking-tight">{totalCost.toLocaleString()} 메소</p>
                                    <p className="text-[10px] text-orange-500 font-bold opacity-80 mt-1 uppercase italic tracking-tighter">{formatKoreanCurrency(totalCost)}</p>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Information Content Section (Crucial for AdSense) */}
                    <article id="guide" className="max-w-7xl mx-auto px-4 md:px-8 py-16 w-full">
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-gray-100 article-content">
                            <h2 className="text-3xl font-black tracking-tight text-gray-900 mb-8 border-b-4 border-orange-500 inline-block pb-2 italic">Starforce Strategy Guide</h2>
                            
                            <section>
                                <h3>1. 메이플스토리 스타포스란 무엇인가요?</h3>
                                <p>스타포스는 장비의 잠재능력을 한계까지 끌어올리는 메이플스토리의 핵심 강화 시스템입니다. 0성부터 최대 30성까지 강화가 가능하며, 단계가 올라갈수록 아이템의 주력 스탯(STR, DEX, INT, LUK)과 공격력/마력이 비약적으로 상승합니다. 특히 15성 이상의 '고성' 장비는 최상위 보스 레이드를 위한 필수 조건입니다.</p>
                            </section>

                            <section>
                                <h3>2. 2025 KMS NEXT 최신 개편 사항 (하락 삭제)</h3>
                                <p>메이플스토리의 가장 혁신적인 변화 중 하나는 <strong>15성 이상의 모든 구간에서 실패 시 등급 하락이 완전히 삭제</strong>되었다는 점입니다. 과거에는 실패 시 별이 떨어지는 스트레스로 인해 강화가 매우 고통스러웠으나, 이제는 파괴되지 않는 한 별이 유지되므로 목표 등급까지의 심리적 부담이 크게 줄어들었습니다. 대신 상위 구간의 파괴 확률이 조정되어 스페어 장비의 확보가 더욱 중요해졌습니다.</p>
                            </section>

                            <section>
                                <h3>3. 효율적인 강화 이벤트 활용 전략</h3>
                                <ul>

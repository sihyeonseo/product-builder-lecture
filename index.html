<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <h1>제휴 문의</h1>
    <form action="https://formspree.io/f/xbdqrjyp" method="POST">
      <div class="form-group">
        <label for="name">성함/업체명</label>
        <input type="text" id="name" name="name" required placeholder="성함 또는 업체명을 입력해주세요.">
      </div>
      <div class="form-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
      </div>
      <button type="submit">문의하기</button>
    </form>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
